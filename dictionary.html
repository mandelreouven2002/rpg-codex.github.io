<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המילון המלא - קודקס מונחי משחקי תפקידים</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Alef', Inter, sans-serif; direction: rtl; text-align: right; }
    </style>
</head>
<body class="bg-stone-100 text-gray-900 flex flex-col min-h-screen">

    <!-- נאב-בר -->
    <nav class="bg-stone-200 shadow-md border-b-4 border-amber-900 sticky top-0 z-50 w-full">
        <div class="max-w-[1350px] mx-auto px-4 py-3 flex items-center justify-between gap-2 md:gap-4">
            <a href="index.html" class="flex items-center gap-2 md:gap-4 shrink-0 hover:opacity-80 transition-opacity" title="חזרה לדף הבית">
                <div class="hidden md:block">
                    <img src="icon.png" alt="סמל קודקס" class="h-8 w-8 object-contain">
                </div>
                <h1 class="text-xl md:text-2xl font-extrabold text-amber-900 hidden lg:block whitespace-nowrap">קודקס</h1>
            </a>
            
            <div class="flex items-center gap-2 md:gap-4 flex-1 justify-end">
                <!-- עמוד המילון מסומן באדום כיוון שאנחנו בו -->
                <a href="dictionary.html" class="inline-block px-3 py-2 bg-red-800 text-white text-sm md:text-base font-bold rounded-sm shadow-md transition duration-300 whitespace-nowrap">המילון המלא</a>
                
                <div class="relative w-full max-w-[140px] sm:max-w-xs">
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-amber-700" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <input type="text" id="nav-search-input" placeholder="חיפוש..." class="block w-full pl-3 pr-10 py-2 border-2 border-amber-900 rounded-sm leading-5 bg-white text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-amber-700 sm:text-sm transition-colors">
                    <div id="nav-search-results" class="absolute z-50 mt-1 w-full bg-white shadow-xl max-h-72 rounded-sm border border-amber-200 overflow-auto hidden"></div>
                </div>
            </div>
        </div>
    </nav>

    <!-- אזור התוכן המרכזי -->
    <main class="flex-grow w-full max-w-[1350px] mx-auto px-4 py-6 md:py-10">
        <div class="w-full">
            <h2 class="text-3xl font-extrabold text-amber-900 mb-6 border-b-4 border-amber-900 pb-2 inline-block">המילון המלא</h2>
            
            <!-- סרגל סינון למילון -->
            <div class="flex flex-col md:flex-row gap-4 mb-8">
                <input type="text" id="dict-search-input" placeholder="סינון לפי מילה או פירוש..." class="flex-1 p-3 border-2 border-amber-900 bg-white text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-4 focus:ring-amber-700 transition duration-150 rounded-sm">
                
                <select id="dict-tag-filter" class="p-3 border-2 border-amber-900 bg-white text-gray-900 focus:outline-none focus:ring-4 focus:ring-amber-700 transition duration-150 rounded-sm md:w-64">
                    <option value="" class="bg-white">כל הנושאים</option>
                    <!-- ימולא דינמית -->
                </select>
            </div>

            <!-- רשת המילון הרספונסיבית -->
            <div id="full-dictionary-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </main>

    <!-- פוטר -->
    <footer class="mt-auto pt-6 pb-6 border-t-4 border-amber-900 bg-stone-200 text-center text-sm w-full shadow-sm">
        <div class="max-w-[1350px] mx-auto space-y-2 px-4">
            <p class="text-amber-900 font-medium">מנוהל ע"י <a href="https://rrpg.top" target="_blank" class="font-bold text-amber-700 hover:text-red-800 underline transition">גלגול - משחקי תפקידים למען הקהילה</a></p>
            <p class="text-amber-900 font-medium">פותח ע"י <a href="https://lp.reuven.click" target="_blank" class="font-bold text-amber-700 hover:text-red-800 underline transition">ראובן מנדלוביץ'</a></p>
        </div>
    </footer>

    <!-- סקריפטים ספציפיים למילון -->
    <script src="term-search.js"></script>
    <script>
        const dictSearchInput = document.getElementById('dict-search-input');
        const dictTagFilter = document.getElementById('dict-tag-filter');
        const fullDictionaryContainer = document.getElementById('full-dictionary-container');

        function populateTags() {
            const allTags = dictionaryData.flatMap(item => item.tags || []);
            const uniqueTags = [...new Set(allTags)].sort();
            dictTagFilter.innerHTML = `<option value="" class="bg-white">כל הנושאים</option>` + 
                uniqueTags.map(tag => `<option value="${tag}" class="bg-white">${tag}</option>`).join('');
        }

        function renderDictCards(data) {
            if (data.length === 0) {
                fullDictionaryContainer.innerHTML = '<p id="no-results-message" class="col-span-full text-center text-lg text-red-700 mt-12 font-bold">😔 לא נמצאו רשומות תואמות לקודקס הנתונים.</p>';
            } else {
                fullDictionaryContainer.innerHTML = data.map(createDictCardHtml).join('');
            }
        }

        function applyDictFilters() {
            const searchTerm = dictSearchInput.value.toLowerCase().trim();
            const selectedTag = dictTagFilter.value;

            let currentData = dictionaryData.filter(item => {
                return !selectedTag || (item.tags && item.tags.includes(selectedTag));
            });

            if (searchTerm.length === 0) {
                currentData.sort((a, b) => a.word.localeCompare(b.word, 'he'));
                renderDictCards(currentData);
                return;
            }

            const scoredData = currentData.map(item => {
                let score = calculateSearchScore(item, searchTerm);
                return { ...item, score };
            });

            const finalFilteredAndSortedData = scoredData
                .filter(entry => entry.score > 0)
                .sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score;
                    return a.word.localeCompare(b.word, 'he'); 
                });

            renderDictCards(finalFilteredAndSortedData);
        }

        window.onload = async function () {
            const success = await initApp();
            if(success) {
                populateTags();
                applyDictFilters(); // טעינה ראשונית של המילים
                
                dictSearchInput.addEventListener('input', applyDictFilters);
                dictTagFilter.addEventListener('change', applyDictFilters);
            } else {
                dictSearchInput.disabled = true;
                dictTagFilter.disabled = true;
                fullDictionaryContainer.innerHTML = '<p class="col-span-full text-center text-lg text-red-700 mt-12 font-bold">❌ שגיאה קריטית בטעינת הנתונים.</p>';
            }
        };
    </script>
</body>
</html>
